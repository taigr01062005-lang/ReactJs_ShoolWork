        let avg=(arr)=>{
            let sum=0
            arr.forEach(element => {
                sum+=element
            });
            return sum/arr.length
        }

        let calcAverageHumanAge = (ages) => {
            let convertedAges=ages.map((age) => {

            })
           console.log(convertedAges)
            let arr=convertedAges.filter((ele)=>{
                return ele > 18
            }) 
            console.log(arr)
            console.log(`Average Human age of all adult dogs: ${avg(arr)}`)


        }
        calcAverageHumanAge(Data_1)
