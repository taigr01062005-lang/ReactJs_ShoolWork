    <script>
        const game = {
            team1: 'Bayern Munich',
            team2: 'Borrussia Dortmund',
            players: [
                [
                    'Neuer',
                    'Pavard',
                    'Martinez',
                    'Alaba',
                    'Davies',
                    'Kimmich',
                    'Goretzka',
                    'Coman',
                    'Muller',
                    'Gnarby',
                    'Lewandowski',
                ],
                [
                    'Burki',

                    'Akanji',
                    'Hakimi',
                    'Weigl',
                    'Witsel',

                ],
            ],
            score: '4:0',
            scored: ['Lewandowski', 'Gnarby', 'Lewandowski',

            date: 'Nov 9th, 2037',
            odds: {
                team1: 1.33,
                x: 3.25,
                team2: 6.5,
            },
        };

        for (let i = 0; i < game.scored.length; i++) {
            console.log(`Goal ${i + 1}: ${game.scored[i]}`)
        }



        const oddsArray = Object.values(game.odds)
        


        let avg = (arr) => {
            let sum = 0
            for (let i = 0; i < arr.length; i++) {
                sum += arr[i]
            }
            return sum / arr.length
        }
        console.log(avg(oddsArray))

        console.log(`Odd of victory ${game.team1}: ${game.odds.team1}`)
        console.log(`Odd of draw: ${game.odds.x}`)
        console.log(`Odd of victory ${game.team1}: ${game.odds.team1}`)

        scorers={}

        for(let player of game.scored){
            if(scorers[player]){
                scorers[player]++
            }else{
                scorers[player]=1
            }
        }
        console.log(scorers)





    </script>
