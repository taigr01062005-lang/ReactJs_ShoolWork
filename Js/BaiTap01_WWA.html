<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let Julia_data = [3, 5, 2, 12, 7]
        let Kate_data = [4, 1, 15, 8, 3]
        let checkDogs=((dogsJulia,dogsKate)=>{
            let dogsJuliaCorreted=dogsJulia.slice(1,-2)
          
            let bothData=[...dogsJuliaCorreted,...dogsKate]
            bothData.forEach((ele,i)=>{
                if(ele>=3){
                    console.log(`Dog number ${i+1} is an adult, and is ${ele} years old`)
                }else{
                    console.log(`Dog number ${i+1} is still a puppy`)
                }
            })
            
        })
        checkDogs(Julia_data,Kate_data)


    </script>


</body>

</html>
