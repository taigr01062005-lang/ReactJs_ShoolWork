<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="" id="bill" placeholder="Bill" >
    <button id="btn">Cal</button>
    <script>
        btn.onclick=()=>{
            let bill=parseFloat(document.getElementById('bill').value)
            let tip = (bill> 50 && bill<30)? bill*0.15 : bill*0.2;
            console.log('The bills was '+bill+', the tip was '+tip+', and the total value '+ (bill+tip));
        }

    </script>
</body>
</html>
